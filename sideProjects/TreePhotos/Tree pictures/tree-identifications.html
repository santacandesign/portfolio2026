<style>
  :root {
    --brown-dark: #392324;
    --brown-mid: #613c27;
    --green: #006303;
    --bg: #f9f7f4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: "Manrope", sans-serif;
    color: var(--brown-dark);
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  header {
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 5vw 32px;
  }
  h1 {
    font-family: "Libre Baskerville", serif;
    font-style: italic;
    font-size: clamp(28px, 4vw, 52px);
    color: var(--brown-dark);
    line-height: 1.1;
  }
  .subtitle {
    font-family: "Libre Baskerville", serif;
    font-style: italic;
    font-size: clamp(13px, 1.4vw, 20px);
    color: var(--brown-mid);
    margin-top: 6px;
  }
  .stats {
    display: flex;
    gap: 32px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .stat {
    background: white;
    border-radius: 12px;
    padding: 10px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
  }
  .stat-label {
    font-size: 11px;
    color: var(--brown-mid);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* filters */
  .filter-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 5vw 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: white;
    border: 1.5px solid #ddd;
    border-radius: 30px;
    padding: 6px 16px;
    font-family: "Manrope", sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--brown-dark);
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--brown-dark);
    color: white;
    border-color: var(--brown-dark);
  }

  /* grid */
  .grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 5vw 64px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.14);
  }
  .card.hidden { display: none; }
  .card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }
  .card-body {
    padding: 10px 12px 14px;
  }
  .card-species {
    font-weight: 700;
    font-size: 13px;
    color: var(--brown-dark);
    line-height: 1.3;
  }
  .card-latin {
    font-family: "Libre Baskerville", serif;
    font-style: italic;
    font-size: 11px;
    color: var(--brown-mid);
    margin-top: 2px;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }
  .card-date {
    font-size: 10px;
    color: #aaa;
  }
  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    color: white;
  }
  .tag-bangalore { background: #6a4c2f; }
  .tag-kochi     { background: #1a7a50; }
  .tag-delhi     { background: #8b5e3c; }
  .tag-dharamshala { background: #3a5fa0; }
</style>

function render(list) {
  const grid = document.getElementById("grid");
  grid.innerHTML = list.map(t => `
    <div class="card" data-city="${t.city}">
      <img src="images/thumb/${t.file}" alt="${t.species}" loading="lazy">
      <div class="card-body">
        <div class="card-species">${t.species}</div>
        <div class="card-latin">${t.latin}</div>
        <div class="card-meta">
          <span class="card-date">${t.date}</span>
          <span class="tag tag-${t.city}">${t.city.charAt(0).toUpperCase()+t.city.slice(1)}</span>
        </div>
      </div>
    </div>
  `).join("");
}

function filter(city) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  const list = city === "all" ? trees : trees.filter(t => t.city === city);
  render(list);
}
