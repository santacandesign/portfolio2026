<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="books.css" />
    <!-- Playfair Display for bookshelf review cards -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>Santa's Portfolio</title>
    <link rel="icon" type="image/png" href="assets/dragonfly.svg" />
  </head>
  <body>
    <div id="loadingOverlay">
      <p id="loadingText">
        Loading<span class="loading-dots"
          ><span>.</span><span>.</span><span>.</span></span
        >
      </p>
    </div>
    <script src="loader.js"></script>
    <div class="bgimage"></div>

    <!-- Static SVG filter: textured hand-drawn border on the contact box -->
    <svg
      style="position: absolute; width: 0; height: 0; overflow: hidden"
      aria-hidden="true"
    >
      <defs>
        <filter id="nav-wobble" x="-20%" y="-40%" width="140%" height="180%">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.04"
            numOctaves="4"
            seed="8"
            result="noise"
          />
          <feDisplacementMap
            in="SourceGraphic"
            in2="noise"
            scale="8"
            xChannelSelector="R"
            yChannelSelector="G"
          />
        </filter>
      </defs>
    </svg>

    <!-- ===== TOP CONTACT BAR (badge + Twitter/Email/LinkedIn) ===== -->
    <div class="contact-top" id="contactTop">
      <div class="contact-badge">
        <p class="contact-badge-text">I'm actively looking for new opportunities!</p>
      </div>
      <div class="contact-links">
        <a class="contact-link" href="https://x.com/santacandesign" target="_blank" rel="noopener">Twitter</a>
        <span class="contact-email-wrap">
          <a class="contact-link contact-email" id="emailContactLink" href="mailto:santrupti.danagaud@gmail.com">Email</a>
          <span class="contact-flyout contact-tooltip" id="emailTooltip">
            <span class="contact-tooltip-label">Click on email to copy!</span>
            <span class="contact-tooltip-email">santrupti.danagaud@gmail.com</span>
          </span>
          <span class="contact-flyout contact-copied" id="emailCopied">Email copied to clipboard.</span>
        </span>
        <a class="contact-link" href="https://www.linkedin.com/in/santruptip/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
    <nav class="new-navbar">
      <div class="nav-mobile-menu" id="navMobileMenu">
        <a href="index.html" class="nav-mobile-item">Home</a>
        <a href="playground.html" class="nav-mobile-item">Playground</a>
        <a href="media.html" class="nav-mobile-item nav-active">Media diet</a>
        <a href="aboutme.html" class="nav-mobile-item">About</a>
      </div>
      <div class="nav-pill-bar">
        <button class="nav-hamburger" id="navHamburger" onclick="toggleMobileNav()">
          <svg class="nav-hamburger-lines" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="17" y2="6" /><line x1="3" y1="10" x2="17" y2="10" /><line x1="3" y1="14" x2="17" y2="14" />
          </svg>
          <svg class="nav-hamburger-close" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="2" y1="2" x2="12" y2="12" /><line x1="12" y1="2" x2="2" y2="12" />
          </svg>
        </button>
        <a href="index.html" class="nav-item">Home</a>
        <a href="playground.html" class="nav-item">Playground</a>
        <a href="media.html" class="nav-item nav-active">Media diet</a>
        <a href="aboutme.html" class="nav-item">About</a>
      </div>
    </nav>
    <script>
      function toggleMobileNav() {
        var menu = document.getElementById("navMobileMenu");
        var hamburger = document.getElementById("navHamburger");
        var badge = document.querySelector(".contact-badge");
        menu.classList.toggle("open");
        hamburger.classList.toggle("is-open");
        if (badge)
          badge.classList.toggle("badge-hidden", menu.classList.contains("open"));
      }

      (function () {
        var EMAIL = "santrupti.danagaud@gmail.com";
        var wrap = document.querySelector(".contact-email-wrap");
        var link = document.getElementById("emailContactLink");
        var tooltip = document.getElementById("emailTooltip");
        var copied = document.getElementById("emailCopied");
        if (!link) return;
        var hideTimer = null;

        function showCopied() {
          if (tooltip) tooltip.classList.remove("is-visible");
          copied.classList.add("is-visible");
          link.classList.add("is-active");
          clearTimeout(hideTimer);
          hideTimer = setTimeout(function () {
            copied.classList.remove("is-visible");
            link.classList.remove("is-active");
          }, 2200);
        }

        function fallbackCopy() {
          try {
            var t = document.createElement("textarea");
            t.value = EMAIL;
            t.setAttribute("readonly", "");
            t.style.position = "absolute";
            t.style.left = "-9999px";
            document.body.appendChild(t);
            t.select();
            document.execCommand("copy");
            document.body.removeChild(t);
          } catch (e) {}
          showCopied();
        }

        function copyEmail() {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(EMAIL).then(showCopied, fallbackCopy);
          } else {
            fallbackCopy();
          }
        }

        link.addEventListener("click", function (e) {
          e.preventDefault();
          copyEmail();
        });

        if (wrap && tooltip) {
          wrap.addEventListener("mouseenter", function () {
            if (copied.classList.contains("is-visible")) return;
            tooltip.classList.add("is-visible");
          });
          wrap.addEventListener("mouseleave", function () {
            tooltip.classList.remove("is-visible");
          });
        }
      })();
    </script>

    <div class="playstyles">
      <!-- Hidden SVG filter for paper texture -->
      <svg class="bs-svg-defs" aria-hidden="true">
        <defs>
          <filter id="bs-paper" x="0%" y="0%" width="100%" height="100%">
            <feTurbulence
              type="fractalNoise"
              baseFrequency="0.9"
              numOctaves="8"
              result="noise"
            />
            <feDiffuseLighting
              in="noise"
              lightingColor="white"
              surfaceScale="1"
              result="diffLight"
            >
              <feDistantLight azimuth="45" elevation="35" />
            </feDiffuseLighting>
          </filter>
        </defs>
      </svg>

      <div class="bs-wrap">
        <h2
          style="
            font-family: &quot;Libre italic&quot;, serif;
            margin-bottom: 4px;
          "
        >
          Books I love
        </h2>

        <!-- Shelf -->
        <div class="bs-shelf-outer" id="bsShelfOuter">
          <button
            class="bs-arrow bs-arrow-left"
            id="bsArrowLeft"
            aria-label="Scroll left"
          >
            &#x2039;
          </button>
          <button
            class="bs-arrow bs-arrow-right"
            id="bsArrowRight"
            aria-label="Scroll right"
          >
            &#x203a;
          </button>
          <div class="bs-viewport" id="bsViewport">
            <div class="bs-books-row" id="bsBooksRow"></div>
          </div>
        </div>
        <div class="bs-plank"></div>

        <!-- Dots -->
        <div class="bs-dots" id="bsDots"></div>

        <!-- Review -->
        <div class="bs-review" id="bsReview">
          <div class="bs-review-empty" id="bsEmpty">
            Click a spine to know more
          </div>
        </div>
      </div>
      <!-- /bs-wrap -->
      <br /><br />
      <!-- /aboutme -->
    </div>

    <!-- Scripts -->
    <script src="books.js"></script>
  </body>
</html>
